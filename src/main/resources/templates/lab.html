<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="UTF-8">
    <title>Лабораторная работа: Изотерма</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f2f5;
            color: #333;
        }

        /* Главный контейнер, который делит экран */
        .wrapper {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            align-items: flex-start;
        }

        /* Левая колонка (30% ширины) */
        .sidebar {
            flex: 0 0 350px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        /* Правая колонка (70% ширины) */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .custom-select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background-color: white;
            font-size: 14px;
            cursor: pointer;
            box-sizing: border-box;
        }

        .custom-select:focus {
            outline: none;
            border-color: #000066;
        }

        .btn-calculate {
            width: 100%;
            padding: 12px;
            background-color: #000066;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        h2, h3 { color: #000066; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }

        button {
            width: 100%; padding: 12px; background-color: #000066; color: white;
            border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: 0.3s;
        }
        button:hover { background-color: #000099; }

        .status { font-style: italic; color: #7f8c8d; margin-top: 10px; display: block; font-size: 13px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border: 1px solid #eee; text-align: left; }
        th { background-color: #f8f9fa; color: #000066; }
        .table-wrapper { max-height: 300px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; }

        .slider-box { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; text-align: center; }
        input[type="range"] { width: 100%; margin: 10px 0; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="sidebar">
        <form th:action="@{/calculate}" method="post">
            <h3 style="margin-top: 0;">Параметры</h3>

            <div class="form-group"> <label>Выберите газ:</label>
                <select name="gasName" onchange="this.form.submit()" class="custom-select">
                    <option value="Воздух" th:selected="${gasModel.MolarMass == 0.029}">Воздух</option>
                    <option value="Кислород" th:selected="${gasModel.MolarMass == 0.032}">Кислород (O₂)</option>
                    <option value="Азот" th:selected="${gasModel.MolarMass == 0.028}">Азот (N₂)</option>
                    <option value="Гелий" th:selected="${gasModel.MolarMass == 0.004}">Гелий (He)</option>
                    <option value="" th:selected="${gasModel.MolarMass == 0.029}">Другой газ</option>
                </select>
            </div>

            <div class="form-group">
                <label>Молярная масса (кг/моль):</label>
                <input type="number" name="MolarMass" th:value="${gasModel.MolarMass}">
            </div>

            <div class="form-group">
                <label>Масса газа (кг):</label>
                <input type="number" step="0.001" name="Mass" th:value="${gasModel.Mass}">
            </div>

            <div class="form-group">
                <label>Начальный объем V₁ (м³):</label>
                <input type="number" step="0.1" name="Volume" th:value="${gasModel.Volume}">
            </div>

            <div class="form-group">
                <label>Температура (К):</label>
                <input type="number" name="Temperature" th:value="${gasModel.Temperature}">
            </div>

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

            <div class="experiment-visual" style="display: flex; flex-direction: column; align-items: center; background: #ffffff; padding: 25px; border-radius: 15px; border: 1px solid #ddd; width: fit-content;">
                <h4 style="margin-top: 0; color: #000066;">Визуализация объема V₂</h4>

                <div style="display: flex; align-items: flex-start; gap: 0; height: 300px; position: relative; padding-right: 40px;">

                    <div class="ruler" style="height: 100%; border-right: 2px solid #333; position: relative; width: 50px; font-family: monospace; font-size: 12px; color: #444;">
                        <span style="position: absolute; top: 0; right: 8px; transform: translateY(-50%);">250 —</span>
                        <span style="position: absolute; top: 20%; right: 8px; transform: translateY(-50%);">200 —</span>
                        <span style="position: absolute; top: 40%; right: 8px; transform: translateY(-50%);">150 —</span>
                        <span style="position: absolute; top: 60%; right: 8px; transform: translateY(-50%);">100 —</span>
                        <span style="position: absolute; top: 80%; right: 8px; transform: translateY(-50%);">50 —</span>
                        <span style="position: absolute; top: 100%; right: 8px; transform: translateY(-50%);">0 —</span>
                    </div>

                    <div id="flask" style="width: 80px; height: 300px; border: 3px solid #555; border-top: none; position: relative; background: rgba(240,248,255,0.5); border-radius: 0 0 15px 15px; overflow: hidden; box-shadow: inset 5px 0 10px rgba(0,0,0,0.05); margin-left: -2px;">
                        <div id="gas-fill" th:style="'position: absolute; bottom: 0; width: 100%; background: linear-gradient(90deg, #2980b9 0%, #3498db 50%, #2980b9 100%); opacity: 0.8; transition: height 0.1s linear; height:' + (${gasModel.PostVolume} / 250 * 100) + '%;'"></div>
                    </div>

                    <div style="height: 300px; margin-left: 20px;">
                        <input type="range" id="v2_slider" name="PostVolume" min="0" max="250" step="1"
                               th:value="${gasModel.PostVolume}"
                               style="writing-mode: vertical-lr; direction: rtl; height: 100%; width: 10px; padding: 0; margin: 0; cursor: pointer;">
                    </div>
                </div>

                <div style="margin-top: 25px; font-size: 1.2em; font-weight: bold; background: #f8f9fa; padding: 10px 20px; border-radius: 10px; border: 1px solid #eee;">
                    V₂ = <span id="v2_display" style="color: #2980b9;" th:text="${gasModel.PostVolume}"></span> м³
                </div>
            </div>

            <button type="submit" class="btn-calculate" style="margin-top: 20px;">Рассчитать и записать</button>
        </form>
    </div>

    <div class="main-content">
        <div class="card" th:if="${gasModel.IsValid}">
            <h3>График процесса (P-V изотерма)</h3>
            <canvas id="isothermChart" style="max-height: 400px;"></canvas>
        </div>

        <div class="card" th:if="${not #lists.isEmpty(gasModel.history)}">
            <h3>Журнал опытов</h3>
            <div style="margin-bottom: 15px; padding: 10px; background: #fff5f7; border: 1px solid #ffb6c1; border-radius: 8px; display: flex; align-items: center; gap: 15px;">
                <form th:action="@{/updateReliability}" method="post" style="display: flex; align-items: center; gap: 10px;">
                    <label style="margin: 0;">Доверительная вероятность (α):</label>
                    <select name="reliability" onchange="this.form.submit()" style="padding: 5px; border-radius: 4px;">
                        <option th:each="rel : ${T(com.example.lab.Errors.Reliability).values()}"
                                th:value="${rel.name()}"
                                th:text="${rel.value}"
                                th:selected="${rel == gasModel.errors.reliability}">
                        </option>
                    </select>
                </form>
                <div style="margin-left: auto; font-weight: bold;">
                    Погрешность ΔV: <span th:text="${gasModel.errors.finalVolumeError}">0.0</span> м³
                </div>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>№</th>
                        <th>V (м³)</th>
                        <th>P (Па)</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="res, iter : ${gasModel.history}">
                        <td th:text="${iter.count}"></td>
                        <td th:text="${res.finalVolume}"></td>
                        <td th:text="${res.finalPressure}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    window.gasData = {
        currentP: /*[[${gasModel.Pressure}]]*/ 0,
        currentV: /*[[${gasModel.Volume}]]*/ 0,
        postP: /*[[${gasModel.PostPressure}]]*/ 0,
        postV: /*[[${gasModel.PostVolume}]]*/ 0,
        mass: /*[[${gasModel.Mass}]]*/ 0,
        molarMass: /*[[${gasModel.MolarMass}]]*/ 0,
        temp: /*[[${gasModel.Temperature}]]*/ 0,
        R: 8.31
    };
</script>
<script th:src="@{/mychart.js}"></script>
<script>
    const slider = document.getElementById('volumeSlider');
    const v2Input = document.getElementById('v2_input');
    const sliderValue = document.getElementById('sliderValue');

    if(slider) {
        slider.oninput = function() {
            sliderValue.textContent = parseFloat(this.value).toFixed(2);
            v2Input.value = parseFloat(this.value).toFixed(2);
        };
    }
</script>
</body>
</html>
