<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="UTF-8">
    <title>Изотермический процесс</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 500px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: auto; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #000066; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #FFDDDD; color: black}
        .result-box { margin-top: 25px; padding: 20px; border-radius: 8px; background-color: #FFDDDD; border-left: 5px solid #000066; }
        .status { font-style: italic; color: #7f8c8d; margin-top: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>Виртуальная лаборатория</h2>



    <form th:action="@{/calculate}" th:object="${gasModel}" method="post">
        <div class="form-group">
            <label for="volume">Начальный объем (V), м³:</label>
            <input id="volume" type="number" step="0.0001" th:field="*{Volume}" required />
        </div>
        <div class="form-group">
            <label for="postvolume">Конечный объем (V), м³:</label>
            <input id="postvolume" type="number" step="0.0001" th:field="*{PostVolume}" required />
        </div>
        <div class="form-group">
            <label for="temp">Температура (T), K:</label>
            <input id="temp" type="number" step="0.1" th:field="*{Temperature}" required />
        </div>
        <div class="form-group">
            <label for="mass">Масса (m), кг:</label>
            <input id="mass" type="number" step="0.001" th:field="*{Mass}" required />
        </div>
        <div class="form-group">
            <label for="molar">Молярная масса (M), кг/моль:</label>
            <input id="molar" type="number" step="0.0001" th:field="*{MolarMass}" required />
        </div>

        <button type="submit">Рассчитать давление</button>
        <div th:if="${gasModel.IsValid}" style="margin-top: 30px;">
            <div style="text-align: center; font-weight: bold;">
                График изотермического процесса:
            </div>
            <div style="background: white; padding: 10px; border-radius: 8px;">
                <canvas id="isothermChart"></canvas>
            </div>
        </div>
    </form>
    <div th:if="${gasModel.IsValid}" class="result-box">
        <h3>Результаты расчета:</h3>
        <p>Начальное давление (P1):
            <strong th:text="${#numbers.formatDecimal(gasModel.Pressure, 1, 2, 'POINT')}"></strong> Па
        </p>
        <p>Конечное давление (P2):
            <strong th:text="${#numbers.formatDecimal(gasModel.PostPressure, 1, 2, 'POINT')}"></strong> Па
        </p>
        <p>Статус: <span th:text="${gasModel.ProcessInfo}"></span></p>
    </div>
    <div th:if="${not #lists.isEmpty(gasModel.history)}" class="result-box" style="margin-top: 20px; background-color: #f9f9f9; border-left: 5px solid #000066;">
        <h3 style="color: #000066;">Журнал опытов (T = const)</h3>
        <table style="width: 100%; border-collapse: collapse; margin-top: 10px;">
            <thead>
            <tr style="background-color: #eee; text-align: left;">
                <th style="padding: 8px; border: 1px solid #ddd;">№</th>
                <th style="padding: 8px; border: 1px solid #ddd;">V (м³)</th>
                <th style="padding: 8px; border: 1px solid #ddd;">P (Па)</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="res, iter : ${gasModel.history}">
                <td style="padding: 8px; border: 1px solid #ddd;" th:text="${iter.count}"></td>
                <td style="padding: 8px; border: 1px solid #ddd;" th:text="${res.finalVolume}"></td>
                <td style="padding: 8px; border: 1px solid #ddd;" th:text="${res.finalPressure}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<script th:inline="javascript">
    window.gasData = {
        currentP: /*[[${gasModel.Pressure}]]*/ 0,
        currentV: /*[[${gasModel.Volume}]]*/ 0,
        postP: /*[[${gasModel.PostPressure}]]*/ 0,
        postV: /*[[${gasModel.PostVolume}]]*/ 0,
        mass: /*[[${gasModel.Mass}]]*/ 0,
        molarMass: /*[[${gasModel.MolarMass}]]*/ 0,
        temp: /*[[${gasModel.Temperature}]]*/ 0,
        R: /*[[${T(com.example.lab.Constants).MOLAR_GAS_CONSTANT}]]*/ 8.31
    };
</script>

<script th:src="@{/js/isotherm-logic.js}"></script>
<script th:src="@{/js/mychart.js}"></script>
</body>
</html>
